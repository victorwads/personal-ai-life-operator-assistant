name: AssistantMCPServer
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.wads.AssistantMCPServer
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: 0.12.1
  yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.1.3
schemes:
  AssistantMCPServer:
    build:
      targets:
        AssistantMCPServer: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  AssistantMCPServer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: "Sources/Assets.xcassets"
      - path: "plugins/lmstudio/Assistant System prompt-ptBR.md"
      - path: "plugins/lmstudio/Assistant System prompt.md"
      - path: "Resources/whatsapp_web_selectors.yaml"
    dependencies:
      - package: swift-sdk
        product: MCP
      - package: yams
        product: Yams
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEAD_CODE_STRIPPING: YES
