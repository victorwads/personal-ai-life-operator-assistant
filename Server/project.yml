name: AIAssistantHub
options:
  bundleIdPrefix: com.localaiassistant
  deploymentTarget:
    macOS: "14.0"
fileGroups:
  - project.yml
  - ../firestore.indexes.json
  - ../firebase.rules
  - ../firebase.json
  - AGENTS.md
  - Docs
  - Sources
  - Scripts
  - Tests
packages:
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: "0.12.1"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "12.13.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "9.1.0"
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "6.0.1"
targets:
  AIAssistantHub:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: MCP
        product: MCP
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Yams
        product: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localaiassistant.aiassistanthub
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist

        # Google/Firebase Auth persists credentials via Keychain on macOS.
        # In practice this is most reliable with a real development signature.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DU6489YN3U
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/AIAssistantHub.entitlements

        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  AIAssistantHubTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AIAssistantHubTests
        excludes:
          - "Fixtures/**"
          - "**/*.md"
    resources:
      - path: Tests/AIAssistantHubTests/Fixtures
    dependencies:
      - target: AIAssistantHub
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  AIAssistantHub:
    build:
      targets:
        AIAssistantHub: all
        AIAssistantHubTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIAssistantHubTests
  AIAssistantHubEmulators:
    build:
      targets:
        AIAssistantHub: all
        AIAssistantHubTests: [test]
    run:
      config: Debug
      environmentVariables:
        FIREBASE_USE_EMULATORS: "1"
        FIREBASE_EMULATOR_HOST: "localhost"
        FIRESTORE_EMULATOR_PORT: "8080"
        FIREBASE_AUTH_EMULATOR_PORT: "9099"
    test:
      config: Debug
      targets:
        - AIAssistantHubTests
