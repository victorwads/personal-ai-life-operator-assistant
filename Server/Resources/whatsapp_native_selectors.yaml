schema_version: 1
version: "2026-05-20"
type: native

flows:
  app_open:
    type: flow
    requires_any:
      - type: element
        role: "AXApplication"

native:
  chat_list_root:
    type: element
    path: "0.0.0.2.1.0"
    description_contains: "List of chats"
    extract:
      chat_items:
        type: elements
        scope: "descendants"
        role_any: ["AXButton", "AXStaticText"]
        help_contains: "open chat"
        min_height: 40
        extract:
          title:
            type: text
            from: "description"
            parse: "conversation_name"
          preview:
            type: text
            from: "value"
            parse: "conversation_preview"
          time_text:
            type: text
            from: "value"
            parse: "conversation_time"
          unread_count:
            type: number
            parse: "unread_count"

  message_list_root:
    type: element
    path: "0.0.0.4.1.0"
    description_contains: "Messages in chat with"
    extract:
      messages:
        type: elements
        scope: "children"
        role: "AXStaticText"
        text_contains_any:
          - "Sent to"
          - "Received from"
          - "Message from"
          - "Received in"
          - "Voice message"
          - "Your message"
          - "message,"
        extract:
          message_text:
            type: text
            from: "description"
            parse: "message_text"
          timestamp_text:
            type: text
            from: "description"
            parse: "message_timestamp"
          author_name:
            type: text
            from: "description"
            parse: "message_author"
          direction:
            type: text
            from: "description"
            parse: "message_direction"
          kind:
            type: text
            from: "description"
            parse: "message_kind"
          status:
            type: text
            from: "description"
            parse: "message_status"

  compose_container:
    type: element
    path: "0.0.0.4.1"
    role: "AXGroup"

  compose_field:
    type: element
    role: "AXTextArea"
    description_contains_any:
      - "compose message"
      - "mensagem"
      - "message"

  send_button:
    type: element
    role: "AXButton"
    text_contains_any:
      - "send"
      - "enviar"

  search_field:
    type: element
    subrole: "AXSearchField"
