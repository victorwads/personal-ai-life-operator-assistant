schema_version: 1
version: 1

flows:
  login_qr:
    type: boolean
    selector: "canvas"

  downloading:
    type: boolean
    text_includes_any:
      - "mensagens estão sendo baixadas"
      - "messages are being downloaded"

  chat_list:
    type: boolean
    selector: '[data-testid="chat-list"]'

  chat_selected:
    type: boolean
    selector: '[data-testid="conversation-panel-wrapper"]'

web:
  chat_list_root:
    type: element
    selector: '[data-testid="chat-list"]'
    extract:
      chat_items:
        type: elements
        selector: '[data-testid^="list-item-"]'
        extract:
          chat_clickable_to_open_options:
            type: element
            selector: "[data-testid]"

          chat_clickable_to_open_chat:
            type: element
            selector: '[data-testid="cell-frame-container"]'

          chat_item_name:
            type: text
            selector: '[data-testid="cell-frame-title"] [title]'
            attribute: "title"

          chat_item_last_message:
            type: text
            selector: '[data-testid="cell-frame-secondary"] [title]'
            attribute: "title"

          chat_item_last_message_time:
            type: text
            selector: '[data-testid="cell-frame-primary-detail"]'

          chat_item_unread_badge:
            type: element
            selector: '[data-testid="icon-unread-count"]'
            extract:
              count:
                type: number
                value_from:
                  - "textContent:int"
                fallback_number: 1

  current_chat:
    type: element
    selector: '[data-testid="conversation-panel-wrapper"]'
    extract:
      chat_title:
        type: text
        selector: '[data-testid="conversation-info-header-chat-title"]'
        attribute: "title"

      chat_input_message_box:
        type: element
        selector: '[data-testid="conversation-compose-box-input"] [contenteditable="true"]'

      chat_button_send_message:
        type: element
        selector: '[data-testid="compose-btn-send"]'

      chat_messages:
        type: elements
        selector: '[data-testid="msg-container"]'
        extract:
          message_text:
            type: text
            selector: '[data-testid="selectable-text"]'

          message_time:
            type: text
            selector: '[data-testid="msg-meta"]'
            attribute: "aria-label"

          message_status:
            type: text
            selector: '[data-testid^="msg-"]'
            attribute: "data-testid"

          message_author:
            type: text
            selector: '[data-testid="author"]'
            attribute: "title"

          message_kind:
            type: text
            selector: "[data-testid]"
